name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
  UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            BACKEND/package-lock.json
            FRONTEND/package-lock.json

      - name: Install BACKEND dependencies
        run: npm ci
        working-directory: ./BACKEND

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./BACKEND
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install FRONTEND dependencies
        run: npm ci
        working-directory: ./FRONTEND

      - name: Run BACKEND lint
        run: npm run lint
        working-directory: ./BACKEND

      - name: Run FRONTEND lint
        run: npm run lint
        working-directory: ./FRONTEND

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: BACKEND/package-lock.json

      - name: Install BACKEND dependencies
        run: npm ci
        working-directory: ./BACKEND

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./BACKEND
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run BACKEND tests with coverage
        run: npm run test:cov
        working-directory: ./BACKEND
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload BACKEND coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: BACKEND/coverage
          retention-days: 7

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: FRONTEND/package-lock.json

      - name: Install FRONTEND dependencies
        run: npm ci
        working-directory: ./FRONTEND

      - name: Run FRONTEND unit tests
        run: npm run test
        working-directory: ./FRONTEND

      - name: Upload FRONTEND coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: FRONTEND/coverage
          retention-days: 7

  test-e2e:
    name: Test E2E
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: FRONTEND/package-lock.json

      - name: Install FRONTEND dependencies
        run: npm ci
        working-directory: ./FRONTEND

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('FRONTEND/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: ./FRONTEND

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: ./FRONTEND

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: FRONTEND/test-results
          retention-days: 7

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: BACKEND/package-lock.json

      - name: Install BACKEND dependencies
        run: npm ci
        working-directory: ./BACKEND

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./BACKEND
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build BACKEND
        run: npm run build
        working-directory: ./BACKEND

      - name: Upload BACKEND build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: BACKEND/dist
          retention-days: 7

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: FRONTEND/package-lock.json

      - name: Install FRONTEND dependencies
        run: npm ci
        working-directory: ./FRONTEND

      - name: Build FRONTEND
        run: npm run build
        working-directory: ./FRONTEND

      - name: Upload FRONTEND build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: FRONTEND/dist
          retention-days: 7

  test-desktop:
    name: Test Desktop
    runs-on: windows-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Desktop dependencies
        run: dotnet restore
        working-directory: ./DESKTOP

      - name: Build Desktop
        run: dotnet build --no-restore --configuration Release
        working-directory: ./DESKTOP

      - name: Run Desktop tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: ./DESKTOP

  test-mobile:
    name: Test Mobile
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install Mobile dependencies
        run: flutter pub get
        working-directory: ./educiv_mobile

      - name: Analyze Mobile code
        run: flutter analyze --no-pub
        working-directory: ./educiv_mobile

      - name: Run Mobile tests
        run: flutter test
        working-directory: ./educiv_mobile

  build-desktop:
    name: Build Desktop
    runs-on: windows-latest
    needs: test-desktop
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Desktop dependencies
        run: dotnet restore
        working-directory: ./DESKTOP

      - name: Publish Desktop (win-x64)
        run: dotnet publish src/EduCIV.App/EduCIV.App.csproj -c Release -r win-x64 --self-contained false -o ./publish
        working-directory: ./DESKTOP

      - name: Upload Desktop build artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-win-x64
          path: DESKTOP/src/publish
          retention-days: 7

  build-mobile-android:
    name: Build Mobile Android
    runs-on: ubuntu-latest
    needs: test-mobile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Mobile dependencies
        run: flutter pub get
        working-directory: ./educiv_mobile

      - name: Build Android APK (release)
        run: flutter build apk --release
        working-directory: ./educiv_mobile

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-apk
          path: educiv_mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  build-mobile-ios:
    name: Build Mobile iOS
    runs-on: macos-latest
    needs: test-mobile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install Mobile dependencies
        run: flutter pub get
        working-directory: ./educiv_mobile

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
        working-directory: ./educiv_mobile

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios-build
          path: educiv_mobile/build/ios/iphoneos/Runner.app
          retention-days: 7

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-desktop, build-mobile-android, build-mobile-ios, test-e2e]
    environment: staging
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download BACKEND artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: BACKEND/dist

      - name: Download FRONTEND artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: FRONTEND/dist

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: npm run deploy:staging
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download BACKEND artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: BACKEND/dist

      - name: Download FRONTEND artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: FRONTEND/dist

      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          # Example: npm run deploy:production
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}